{% extends 'base.html' %}
{% block title %}Select Pattern{% endblock %}
{% block content %}

<div class="page-header">
  <h1 class="page-title"><span class="accent">//</span>Select Pattern</h1>
</div>

    <p style="font-family: var(--mono); font-size: 1.25rem">{{ user_problem.problem.title }}</p>
    
    <form method="POST">
    <div class="form-group">   
        {{ form.hidden_tag() }}
        {{ form.patterns.label }}
        <div class="checkbox-grid">
        {{ form.patterns() }}
        </div>
    </div>
    <div class="form-group"> 
        {{ form.submit() }}
    </div>
    </form>

{% endblock %}
